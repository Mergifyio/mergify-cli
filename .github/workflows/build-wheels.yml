name: build wheels

# Reusable workflow that builds the per-target maturin wheel matrix
# plus the sdist. Called from:
#
#   - `ci.yaml` on every PR — smoke build, no publish, version stays
#     at the placeholder so PRs can iterate without colliding with
#     PyPI versioning.
#   - `release.yml` on `release: published` — same matrix, but the
#     wheel version is stamped from `$GITHUB_REF` and the artifacts
#     are uploaded for the publish job to push to PyPI.
#
# Targets: Linux x64 + arm64 (manylinux), macOS x64 + arm64,
# Windows x64. Add new targets here when a new platform is on the
# support matrix — both CI and release pick it up automatically.
#
# Linux arm64 uses a native `ubuntu-24.04-arm` runner instead of
# cross-compiling: `ring`'s ARM-asm build script needs the C
# compiler to define `__ARM_ARCH`, which the cross-gcc inside the
# manylinux Docker image doesn't, and a native runner sidesteps the
# problem entirely.

on:
  workflow_call:
    inputs:
      stamp-version:
        description: |
          When true, replace `version = "..."` in pyproject.toml
          before maturin runs. Source is `inputs.override-version`
          when set (the workflow_dispatch draft path doesn't have a
          tag yet), otherwise `${GITHUB_REF#refs/tags/}`. Keep false
          for PR smoke builds so CI exercises the full path with
          the placeholder version.
        required: false
        default: false
        type: boolean
      override-version:
        description: |
          Explicit version string to stamp into the wheel. Lets the
          dispatch-driven draft job pass its `tag` input through —
          no git tag exists yet at that point, so the build can't
          derive it from `$GITHUB_REF`. Ignored when `stamp-version`
          is false; required when both `stamp-version` is true and
          the caller wasn't triggered by a `release` event.
        required: false
        default: ''
        type: string

jobs:
  build-wheels:
    name: build wheel (${{ matrix.target }})
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-2025
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.14

      - name: Stamp wheel version
        if: inputs.stamp-version
        env:
          # Read the input through the environment, not `${{ }}` shell
          # interpolation, so a value with shell metacharacters reaches
          # bash as a plain string and can't break out of the script.
          OVERRIDE_VERSION: ${{ inputs.override-version }}
        shell: bash
        run: |
          set -eu
          # `override-version` wins; falls back to the git tag the
          # `release: published` flow rides on. The dispatch path
          # passes `inputs.tag` here because no tag exists yet — it
          # gets created by `gh release create` later in the
          # workflow.
          if [ -n "${OVERRIDE_VERSION}" ]; then
              VERSION="${OVERRIDE_VERSION}"
          else
              VERSION="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF}" ]; then
              echo "::error::stamp-version is true but no version source is available (no tag in GITHUB_REF, no override-version input)"
              exit 1
          fi
          # `sed -i.bak`/rm form works on both BSD (macOS) and GNU
          # (Linux) sed without divergent flag handling. On Windows
          # the runner ships GNU sed via Git Bash, which honours the
          # same syntax.
          sed -i.bak -E "s/^version = \".*\"$/version = \"${VERSION}\"/" pyproject.toml
          rm -f pyproject.toml.bak
          echo "Stamped pyproject.toml:"
          grep '^version = ' pyproject.toml
          # Propagate the tag into the maturin build so `mergify
          # --version` reports it. `Cargo.toml` stays at `0.0.0`
          # (cargo's semver rejects the 4-component calver), and
          # `crates/mergify-cli/build.rs` re-exports this env var
          # as a `rustc-env` for the binary's `VERSION` const.
          echo "MERGIFY_RELEASE_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          # `manylinux: auto` picks the most-compatible glibc the
          # target supports; `--strip` shaves debug symbols off the
          # bundled binary.
          args: --release --strip --out target/wheels
          manylinux: auto
          sccache: true
          # Forward MERGIFY_RELEASE_VERSION into the manylinux Docker
          # container. On Linux maturin-action runs the build inside a
          # container and only propagates env vars whose names match an
          # allowlist of prefixes (CARGO_*, GITHUB_*, MATURIN_*, etc.).
          # MERGIFY_RELEASE_VERSION doesn't match any prefix, so without
          # this the variable is silently dropped and build.rs falls back
          # to CARGO_PKG_VERSION (0.0.0). macOS and Windows build natively
          # on the runner and inherit the host env, so they were unaffected.
          docker-options: -e MERGIFY_RELEASE_VERSION

      # `twine check --strict` validates the wheel's metadata against
      # the same rules PyPI's upload validator applies (README
      # rendering, License-File presence, Description-Content-Type,
      # etc.). Running it on every PR catches packaging-metadata
      # regressions at PR time instead of at the next `release:
      # published` event.
      - name: Validate wheel metadata
        shell: bash
        run: |
          python -m pip install --quiet twine
          twine check --strict target/wheels/*.whl

      # Only upload artifacts when the caller actually needs them
      # (release.yml downloads them in its publish job). PR smoke
      # builds just need the build to succeed — keeping the
      # artifact upload off saves cache space and a few seconds per
      # platform.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: inputs.stamp-version
        with:
          name: wheel-${{ matrix.target }}
          path: target/wheels/*.whl

  build-sdist:
    name: build sdist
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.14

      - name: Stamp wheel version
        if: inputs.stamp-version
        env:
          # Through the environment, not `${{ }}` — see the wheel job.
          OVERRIDE_VERSION: ${{ inputs.override-version }}
        shell: bash
        run: |
          set -eu
          # Same source-priority as the wheel job above —
          # `override-version` wins, falls back to the tag.
          if [ -n "${OVERRIDE_VERSION}" ]; then
              VERSION="${OVERRIDE_VERSION}"
          else
              VERSION="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF}" ]; then
              echo "::error::stamp-version is true but no version source is available"
              exit 1
          fi
          sed -i.bak -E "s/^version = \".*\"$/version = \"${VERSION}\"/" pyproject.toml
          rm -f pyproject.toml.bak

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out target/wheels

      # See `Validate wheel metadata` above — twine's strict check
      # exercises the metadata rules PyPI applies. Running it on PR
      # would have caught the missing `License-File LICENSE`
      # bundling that broke release 2026.5.5.1.
      - name: Validate sdist metadata
        shell: bash
        run: |
          python -m pip install --quiet twine
          twine check --strict target/wheels/*.tar.gz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: inputs.stamp-version
        with:
          name: wheel-sdist
          path: target/wheels/*.tar.gz
