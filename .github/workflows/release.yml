name: release

# Two-stage release flow, forced by GitHub's immutable-releases
# policy (assets can't be added after publish — PR #1569 dropped a
# prior `gh release upload` job for the same reason). Naïvely you'd
# expect `release: created` to fire for draft saves and let us
# attach binaries before publish, but GitHub Actions filters
# release events on drafts: nothing fires until the release becomes
# visible. So the prepare stage runs from `workflow_dispatch`
# instead — the maintainer drives it from the Actions UI.
#
# Stage 1 — prepare-draft (`workflow_dispatch`):
#   Maintainer opens Actions → "release" → "Run workflow" → enters
#   the tag (e.g. `2026.6.12.1`). The workflow builds the wheel
#   matrix, extracts the binary from each wheel, packages
#   `mergify-<target>.{tar.gz,zip}` + `SHA256SUMS`, and creates the
#   GitHub Release as a *draft* with all assets attached and notes
#   auto-generated from the commit log via `--generate-notes`.
#
# Stage 2 — publish-stable (`release: published`):
#   Maintainer goes to Releases, reviews the draft (notes + asset
#   list), optionally edits, clicks "Publish release". This fires
#   `release: published`. We assert the expected asset names are
#   present (sanity net if the maintainer somehow stripped them
#   before publish), then build wheels again and push to PyPI.
#   The release is immutable from this point on.
#
# Yes, wheels are built twice (once per stage). Stashing them
# between two separately-triggered runs adds cross-run artifact
# plumbing for ~5 min of CI savings; not worth it. `build-wheels.yml`
# is shared with `ci.yaml` so adding a new platform target there
# extends both stages automatically.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: |
          Release tag to publish (e.g. `2026.6.12.1`). Leave empty
          to auto-pick `YYYY.M.D.<next>` where `<next>` is one past
          the highest existing tag for today's UTC date (1 if no
          release has shipped today yet).
        required: false
        type: string
        default: ''
      target_commitish:
        description: |
          Branch or commit SHA to tag. Defaults to the branch the
          workflow runs from — keep as-is unless you're cherry-
          picking a release commit off an older line.
        required: false
        type: string
        default: ''
  release:
    types: [published]

# Serialize runs that could collide on the same tag. Auto-tag
# dispatches share the `auto` group key — two near-simultaneous
# clicks of "Run workflow" with an empty tag would otherwise both
# resolve the same `YYYY.M.D.<next>` before either created the
# release, and one would 422 on `gh release create` for a
# duplicate tag. Explicit-tag and `release: published` runs key off
# the tag itself so unrelated releases run in parallel. Don't
# cancel-in-progress: a release run end-to-end is the only correct
# outcome — partial completion would leave a wheel mismatch with
# the PyPI publish.
concurrency:
  group: release-${{ github.event_name }}-${{ inputs.tag || github.event.release.tag_name || 'auto' }}
  cancel-in-progress: false

jobs:
  # ---------------- Stage 1: prepare draft ----------------

  compute-tag:
    name: resolve release tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          # `git tag -l` needs the full tag list to find today's
          # highest counter.
          fetch-depth: 0
          fetch-tags: true

      # Either honour an explicit `tag` input or synthesise
      # `YYYY.M.D.<next>` from today's UTC date and the existing
      # tag list. Both paths validate the result against the
      # calver shape so a typo doesn't drift through the matrix
      # and produce a wheel with a garbage version string.
      - id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG}" ]; then
              tag="${INPUT_TAG}"
              echo "Using explicit tag: ${tag}"
          else
              # `%-m` / `%-d` drop the leading zero — matches the
              # historic calver style (`2026.6.5.1`, not
              # `2026.06.05.01`). UTC so the rollover is the same
              # regardless of which maintainer triggers the run.
              today=$(date -u +'%Y.%-m.%-d')
              # Each pipe stage can fail loudly under `pipefail`
              # *except* `grep` returning 1 on a no-match — that's
              # the legitimate "no release shipped today yet"
              # path and must collapse to an empty `last_n`.
              # Swallow only that one exit with `{ … || true; }`.
              last_n=$(git tag -l "${today}.*" \
                  | { grep -E "^${today//./\\.}\\.[0-9]+$" || true; } \
                  | awk -F. '{print $NF}' \
                  | sort -n \
                  | tail -1)
              if [ -z "${last_n}" ]; then
                  next=1
              else
                  next=$((last_n + 1))
              fi
              tag="${today}.${next}"
              echo "Auto-computed tag: ${tag}"
          fi
          # Final shape check — `gh release create` would accept
          # any string, so the validation lives here. Catches
          # typos in the explicit-tag path and any future bug in
          # the date arithmetic.
          if ! [[ "${tag}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}\.[0-9]+$ ]]; then
              echo "::error::tag '${tag}' doesn't match the YYYY.M.D.N calver shape"
              exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build-wheels-for-draft:
    name: build wheels (draft stage)
    if: github.event_name == 'workflow_dispatch'
    needs: compute-tag
    uses: ./.github/workflows/build-wheels.yml
    with:
      stamp-version: true
      override-version: ${{ needs.compute-tag.outputs.tag }}

  create-draft-release:
    name: create draft release with binaries
    if: github.event_name == 'workflow_dispatch'
    needs: [compute-tag, build-wheels-for-draft]
    runs-on: ubuntu-24.04
    permissions:
      # `gh release create` writes the release.
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          # `--generate-notes` needs full history to walk back to
          # the previous tag.
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v8
        with:
          # Skip `wheel-sdist` (single dash); each wheel artifact is
          # `wheel-<target>` with multiple dashes in the target.
          pattern: wheel-*-*
          path: artifacts

      # Each `wheel-<target>` artifact is a maturin-built wheel with
      # the `mergify` binary at `<dist>.data/scripts/mergify[.exe]`.
      # Extract it, normalise into `mergify-<target>.{tar.gz,zip}`,
      # then hash the lot with sha256 so the installer can verify
      # what it pulled. Stable names (no embedded version) so the
      # `releases/latest/download/...` redirect keeps working for
      # the `install.sh` consumers — the version is still observable
      # via `mergify --version` after install.
      - name: Extract binaries and repack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for dir in artifacts/wheel-*; do
            target="${dir#artifacts/wheel-}"
            whl=$(ls "${dir}"/*.whl | head -1)
            workdir=$(mktemp -d)
            # Pick the binary name up-front from the target — every
            # wheel ships exactly one of `mergify` or `mergify.exe`,
            # never both. Passing *both* patterns to `unzip` made it
            # exit 11 ("no matching files") for whichever pattern
            # didn't apply, even when the other one did extract,
            # killing the script under `set -e`.
            if [[ "${target}" == *windows* ]]; then
              bin=mergify.exe
            else
              bin=mergify
            fi
            # `-joq` is the combined form of `-j -o -q`: junk paths
            # (flatten), overwrite without prompting, quiet. The
            # wheel layout is `<dist>.data/scripts/<bin>`; we only
            # want `<bin>` extracted at the workdir root.
            unzip -joq "${whl}" "*/scripts/${bin}" -d "${workdir}"
            if [[ "${target}" == *windows* ]]; then
              (cd "${workdir}" && zip -q "${OLDPWD}/dist/mergify-${target}.zip" "${bin}")
            else
              chmod +x "${workdir}/${bin}"
              tar -C "${workdir}" -czf "dist/mergify-${target}.tar.gz" "${bin}"
            fi
            rm -rf "${workdir}"
          done
          (cd dist && sha256sum mergify-* > SHA256SUMS)
          echo "Built release assets:"
          ls -la dist

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # Read inputs via env, not `${{ }}` interpolation, so a
          # tag or commitish value containing shell metacharacters
          # can't break out of the script. With direct
          # interpolation, `inputs.tag = "foo'; rm -rf /; '"` would
          # render the script as runnable injected commands;
          # through env they reach bash as plain string values.
          INPUT_TAG: ${{ needs.compute-tag.outputs.tag }}
          INPUT_TARGET: ${{ inputs.target_commitish }}
        shell: bash
        run: |
          set -euo pipefail
          # Build the gh argument list as an array — keeps each
          # element a single argv slot regardless of the value's
          # contents.
          args=(
              "${INPUT_TAG}"
              --draft
              --generate-notes
              --title "${INPUT_TAG}"
          )
          if [ -n "${INPUT_TARGET}" ]; then
              args+=(--target "${INPUT_TARGET}")
          fi
          # `--draft` keeps the release mutable until the maintainer
          # clicks Publish. `--generate-notes` builds a changelog
          # from PRs merged since the previous tag — overridable in
          # the UI before publish if needed.
          gh release create "${args[@]}" dist/*

          url=$(gh release view "${INPUT_TAG}" --json url --jq .url)
          echo
          echo "Draft release created: ${url}"
          echo "Review the draft and click Publish in the Releases UI to ship."

  # ---------------- Stage 2: publish + PyPI ----------------

  assert-binaries-present:
    name: assert binary assets attached
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check expected assets are on the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          mapfile -t attached < <(gh release view "$tag" --json assets --jq '.assets[].name')
          echo "Assets on $tag:"
          printf '  %s\n' "${attached[@]}"

          expected=(
            mergify-x86_64-unknown-linux-gnu.tar.gz
            mergify-aarch64-unknown-linux-gnu.tar.gz
            mergify-x86_64-apple-darwin.tar.gz
            mergify-aarch64-apple-darwin.tar.gz
            mergify-x86_64-pc-windows-msvc.zip
            SHA256SUMS
          )
          missing=()
          for asset in "${expected[@]}"; do
            printf '%s\n' "${attached[@]}" | grep -qx "$asset" || missing+=("$asset")
          done
          if (( ${#missing[@]} > 0 )); then
            cat <<EOF >&2
          ::error::Release $tag is missing assets: ${missing[*]}

          Binary assets are attached by the 'create-draft-release' job, which
          runs from Actions → "release" → "Run workflow". Did you create this
          release through the Releases UI directly instead? That path doesn't
          attach binaries, and the release is now immutable so they can't be
          backfilled — the PyPI publish is being blocked so the package and the
          binary distributions don't diverge.

          Recovery: delete this release, then re-create it via Actions →
          "release" → "Run workflow" with the same tag.
          EOF
            exit 1
          fi
          echo "All expected assets present — proceeding."

  build-wheels-for-publish:
    name: build wheels (publish stage)
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: assert-binaries-present
    uses: ./.github/workflows/build-wheels.yml
    with:
      stamp-version: true

  publish:
    name: publish to PyPI
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-24.04
    needs:
      - assert-binaries-present
      - build-wheels-for-publish
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          # `wheel-*` covers both `wheel-<target>` artifacts and
          # `wheel-sdist` — PyPI gets both.
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - name: Confirm collected artifacts
        run: ls -la dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
