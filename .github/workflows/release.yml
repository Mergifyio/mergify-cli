name: upload release to PyPI

# Builds the platform-tagged wheel matrix (delegated to
# `build-wheels.yml`) plus an sdist with the wheel version stamped
# from the git tag, then publishes everything to PyPI in a single
# Trusted-Publisher upload.
#
# `build-wheels.yml` is shared with `ci.yaml`; the only release-
# specific behaviour lives here (version stamping, the publish
# step itself). Adding a new platform target in `build-wheels.yml`
# automatically extends the release matrix.

on:
  release:
    types:
      - published

jobs:
  build:
    uses: ./.github/workflows/build-wheels.yml
    with:
      stamp-version: true

  publish:
    name: publish to PyPI
    runs-on: ubuntu-24.04
    needs:
      - build
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - name: Confirm collected artifacts
        run: ls -la dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  cli-schema:
    # Generate the machine-readable CLI schema from the tagged source
    # and attach it to the release. The docs site consumes this asset
    # (via the ci-bot schemas sync) to build the command reference, so
    # it tracks released versions and never lives in the repo tree.
    name: attach CLI schema to release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2

      - name: Generate CLI schema
        run: cargo run --quiet --bin mergify -- _internal dump-cli-schema > cli-schema.json

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" cli-schema.json --clobber
